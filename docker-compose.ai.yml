version: "3.9"

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-5}"
    labels: "com.hebrew.service,com.hebrew.component,com.hebrew.log_pipeline"

services:
  db:
    image: postgres:16-alpine
    container_name: ai_bridge_db
    environment:
      POSTGRES_USER: ai_bridge
      POSTGRES_PASSWORD: ai_bridge_password
      POSTGRES_DB: ai_bridge
    command: ["postgres", "-c", "shared_buffers=256MB", "-c", "max_connections=200", "-c", "effective_cache_size=768MB", "-c", "work_mem=16MB"]
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: ./core/Dockerfile
    container_name: hebrew_ai_orchestrator
    environment:
      PYTHONPATH: /app
      TESTING: "false"
      AI_BRIDGE_AUTOSTART_LOCAL_LLM: "false"
      AI_BRIDGE_AUTOSTART_EASY_DIFFUSION: ${AI_BRIDGE_AUTOSTART_EASY_DIFFUSION:-true}
      AI_BRIDGE_LOCAL_LLM_AUTO_PROVISION: "false"
      AI_BRIDGE_LOCAL_LLM_ENDPOINT: http://host.containers.internal:11434
      AI_BRIDGE_LOCAL_LLM_PORT: "11434"
      AI_BRIDGE_LOCAL_LLM_MODEL: ${AI_BRIDGE_LOCAL_LLM_MODEL:-qwen2.5:32b-instruct-q4_k_m}
      AI_BRIDGE_WORKSPACE_ROOT: ${AI_BRIDGE_WORKSPACE_ROOT:-/var/home/sanya/Hebrew-web}
      AI_BRIDGE_EASY_DIFFUSION_START_ENABLED: ${AI_BRIDGE_EASY_DIFFUSION_START_ENABLED:-true}
      AI_BRIDGE_EASY_DIFFUSION_URL: ${AI_BRIDGE_EASY_DIFFUSION_URL:-http://host.containers.internal:9000}
      AI_BRIDGE_EASY_DIFFUSION_COMPOSE_FILE: ${AI_BRIDGE_EASY_DIFFUSION_COMPOSE_FILE:-/var/home/sanya/Hebrew-web/docker-compose.easy-diffusion.yml}
      AI_BRIDGE_EASY_DIFFUSION_SERVICE_NAME: ${AI_BRIDGE_EASY_DIFFUSION_SERVICE_NAME:-easy-diffusion}
      AI_BRIDGE_EASY_DIFFUSION_MODELS: ${AI_BRIDGE_EASY_DIFFUSION_MODELS:-}
      AI_BRIDGE_EASY_DIFFUSION_DEFAULT_MODEL: ${AI_BRIDGE_EASY_DIFFUSION_DEFAULT_MODEL:-}
      AI_BRIDGE_MEMORY_ENABLED: "true"
      AI_BRIDGE_MEMORY_DATABASE_URL: postgresql+psycopg2://ai_bridge:ai_bridge_password@db:5432/ai_bridge
      AI_BRIDGE_MEMORY_STORE_DIR: /app/memory_store
      AI_BRIDGE_LIVE_MODEL_PROBE: ${AI_BRIDGE_LIVE_MODEL_PROBE:-false}
      AI_BRIDGE_REQUIRE_EXTERNAL_SCANNERS: ${AI_BRIDGE_REQUIRE_EXTERNAL_SCANNERS:-false}
      AI_BRIDGE_OPENAI_AUTO_MODEL: ${AI_BRIDGE_OPENAI_AUTO_MODEL:-true}
      OPENAI_SESSION_TOKEN_BUDGET: ${OPENAI_SESSION_TOKEN_BUDGET:-120000}
    command:
      - sh
      - -lc
      - |
        export PATH=$$PATH:/app/.local/bin
        export PYTHONPATH=/app
        export AI_BRIDGE_MEMORY_ENABLED=true
        export AI_BRIDGE_MEMORY_DATABASE_URL=postgresql+psycopg2://ai_bridge:ai_bridge_password@db:5432/ai_bridge
        
        # Run migration if needed (simplified check)
        python3 scripts/migrate_themes_to_pg.py || echo "Migration failed or unnecessary."
        
        exec python3 -m core.scripts.orchestrator_daemon
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    volumes:
      - core_memory:/app/memory_store
      - /var/home/sanya/.local/bin:/app/.local/bin:ro
      - ./.env.bridge:/app/.env.bridge:ro,z
      - ./scripts:/app/scripts:ro
    depends_on:
      - db
      - rabbitmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 8s
      retries: 20
    restart: unless-stopped
    labels:
      com.hebrew.service: "orchestrator"
      com.hebrew.component: "ai-bridge"
      com.hebrew.log_pipeline: "loki"
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ai_bridge_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
    logging: *default-logging

volumes:
  core_memory:
    name: ${AI_BRIDGE_MEMORY_VOLUME_NAME:-hebrew_core_memory}
  pg_data:
    name: ${AI_BRIDGE_PG_DATA_VOLUME_NAME:-hebrew_pg_data}
